name: Docker Build and Push CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# id-token: write — required for OIDC login to Azure (no stored passwords).
# contents: read  — required for actions/checkout.
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # strategy.matrix spawns one independent parallel job per service entry.
    # Each job gets its own matrix.service.name and matrix.service.context values.
    # Adding a new service = adding one entry here, not copy-pasting steps.
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./backend/Auth-service
          - name: books-service
            context: ./backend/Books-service
          - name: user-service
            context: ./backend/User-service
          - name: db-service
            context: ./backend/DB-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Azure login is skipped on pull_request — no point authenticating if we are not pushing.
      # On PRs we only build to validate the Dockerfile is correct.
      - name: Log in to Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ACR_NAME is the short registry name (e.g. "devopswithai"), not the full login server URL.
      # az acr login uses the Azure token above — no separate ACR password needed.
      - name: Log in to ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # PR builds — build only to verify the Dockerfile is valid.
      # outputs: type=cacheonly stores the result in the Buildx cache only.
      # This suppresses the "No output specified" warning that appears when push: false
      # is used with the docker-container driver without an explicit output target.
      - name: Build (PR — validate Dockerfile only, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          outputs: type=cacheonly
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      # Main branch builds — build and push two tags:
      #   :github.sha — immutable, tied to the exact commit that produced this image
      #   :latest     — mutable, always points to the most recent main-branch image
      - name: Build and push (main — push to ACR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      # if: always() ensures logout runs even if a previous step failed.
      # Condition also checks we actually logged in — no point logging out if we never logged in.
      - name: Log out from Azure
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: az logout

  # Option C GitOps pattern: after ALL four build jobs succeed, update deployment
  # manifests with the exact SHA image tag and commit back to main. ArgoCD detects
  # the manifest change and syncs the cluster to the new image — no manual rollout needed.
  #
  # A separate job (not another matrix step) avoids four parallel jobs trying to
  # git-push the same files simultaneously, which would cause merge conflicts.
  update-manifests:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # contents: write is required to commit and push manifest changes.
    # This overrides the top-level contents: read for this job only.
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN lets this job push commits. The token is scoped to this
          # repo and expires when the workflow finishes — no stored credentials needed.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history avoids "shallow update not allowed" push failures.
          fetch-depth: 0

      - name: Update image tags to SHA
        run: |
          SHA=${{ github.sha }}
          ACR=${{ secrets.ACR_LOGIN_SERVER }}
          # Replace the image tag in each deployment manifest with the exact SHA.
          # Pattern matches everything after the colon so it replaces both :latest
          # and any previous SHA from an earlier run.
          sed -i "s|${ACR}/auth-service:.*|${ACR}/auth-service:${SHA}|g" k8s/auth-deployment.yml
          sed -i "s|${ACR}/books-service:.*|${ACR}/books-service:${SHA}|g" k8s/books-deployment.yml
          sed -i "s|${ACR}/user-service:.*|${ACR}/user-service:${SHA}|g" k8s/user-deployment.yml
          sed -i "s|${ACR}/db-service:.*|${ACR}/db-service:${SHA}|g" k8s/db-deployment.yml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/auth-deployment.yml k8s/books-deployment.yml \
                  k8s/user-deployment.yml k8s/db-deployment.yml
          # [skip ci] prevents this commit from re-triggering the CI workflow.
          # --allow-empty avoids failure if re-running the same commit (SHA unchanged).
          git commit --allow-empty -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
