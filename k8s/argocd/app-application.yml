apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devopswithai
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/rmonde/DevOpsWithAI.git
    targetRevision: main
    path: k8s/base
    directory:
      # Recurse is off — base/ contains only flat manifests, no subdirs to recurse into.
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      # Automatically sync when ArgoCD detects drift between git and cluster.
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
