apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: devopswithai-envs
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
          - env: qa
          - env: prod
  template:
    metadata:
      name: "devopswithai-{{env}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/rmonde/DevOpsWithAI.git
        targetRevision: main
        path: "k8s/overlays/{{env}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{env}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true