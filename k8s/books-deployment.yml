apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-deployment
  labels:
    app: books
spec:
  replicas: 2
  selector:
    matchLabels:
      app: books
  template:
    metadata:
      labels:
        app: books
    spec:
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z db-service 5432; do echo "waiting for db"; sleep 2; done']
      containers:
      - name: books-container
        image: devopswithai.azurecr.io/books-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: devopswithai-config
              key: DATABASE_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: devopswithai-config
              key: DATABASE_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: devopswithai-config
              key: DATABASE_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: devopswithai-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devopswithai-secret
              key: DB_PASSWORD
        readinessProbe:
          tcpSocket:
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
