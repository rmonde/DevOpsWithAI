apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db-container
        image: devopswithai.azurecr.io/db-service:555ed82b5d683db124178198f063299c705ce492
        imagePullPolicy: Always
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: devopswithai-config
              key: DATABASE_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: devopswithai-secret
              key: DB_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devopswithai-secret
              key: DB_PASSWORD
        # Azure disk mounts create a lost+found directory at the root of the mount point.
        # Mounting directly at /var/lib/postgresql/data causes Postgres initdb to fail
        # ("directory is not empty"). Mounting at the parent and setting PGDATA to the
        # subdirectory keeps lost+found out of Postgres's data directory.
        - name: PGDATA
          value: /var/lib/postgresql/data
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: db-pvc
