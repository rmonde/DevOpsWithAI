  namespace: monitoring
  labels:
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app: user
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      interval: 30s

---

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: book-service-monitor
