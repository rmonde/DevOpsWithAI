apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: qa

patches:
  - target:
      kind: Deployment
      name: auth-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: books-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: user-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2